<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 20px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        input {
            margin: 10px;
            padding: 8px;
            width: 90%;
        }

        button {
            padding: 10px;
            width: 95%;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Cadastro de Produto</h2>

    <form action="/produto" method="post">
        <input type="text" name="nome" placeholder="Nome do produto" required>
        <input type="number" step="0.01" name="preco" placeholder="Preço" required>
        <button type="submit">Cadastrar</button>
    </form>

    <a href="/produto">Ver produtos</a>
</div>

</body>
</html>
